# Keycloak proxy: listen on 6842 inside the container, forward to keycloak:8080.
# Host port is KEYCLOAK_PROXY_PORT (default 6842); map host:6842 in compose.
# Backend uses http://keycloak-proxy:6842 from inside Docker.
#
# Use Docker's embedded DNS (127.0.0.11) as a resolver and pass the upstream via a
# variable. With a literal `proxy_pass http://keycloak:8080`, nginx resolves the
# `keycloak` hostname only once at worker start and caches that IP forever; if the
# Keycloak container boots slowly or is recreated and gets a new IP, nginx keeps
# hitting the dead address and returns 502 (seen by the backend during OpenID
# discovery). A variabilized proxy_pass forces re-resolution on the resolver's TTL.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 6842;
    server_name _;

    location = / {
        return 302 $scheme://$host:$server_port/admin/;
    }

    location / {
        set $kc_upstream keycloak:8080;
        proxy_pass http://$kc_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
