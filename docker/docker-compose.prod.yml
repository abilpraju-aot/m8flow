version: '3.8'

services:
  # Production Backend
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.prod
    container_name: m8flow-backend-prod
    environment:
      SPIFFWORKFLOW_BACKEND_DATABASE_TYPE: mysql
      SPIFFWORKFLOW_BACKEND_DATABASE_URI: ${DATABASE_URI}
      SPIFFWORKFLOW_BACKEND_PERMISSIONS_FILE_NAME: ${PERMISSIONS_FILE}
      SPIFFWORKFLOW_BACKEND_URL: ${BACKEND_URL}
      SPIFFWORKFLOW_BACKEND_OPEN_ID_SERVER_URL: ${OIDC_SERVER_URL}
      
      # M8Flow configuration
      M8FLOW_ENABLE_MULTI_TENANCY: ${M8FLOW_ENABLE_MULTI_TENANCY:-true}
      M8FLOW_ENABLE_INTEGRATIONS: ${M8FLOW_ENABLE_INTEGRATIONS:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    networks:
      - m8flow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1.0/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Production Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend.prod
    container_name: m8flow-frontend-prod
    environment:
      VITE_BACKEND_URL: ${BACKEND_URL}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - m8flow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  m8flow:
    driver: bridge

